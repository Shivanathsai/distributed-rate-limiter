---
# Redis — single-node for dev / staging.
# For production use AWS ElastiCache or Redis Cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rate-limiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--save"
            - ""
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: rate-limiter
spec:
  selector:
    app: redis
  ports:
    - port:       6379
      targetPort: 6379
  type: ClusterIP
