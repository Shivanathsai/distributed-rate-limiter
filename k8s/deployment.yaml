apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter
  namespace: rate-limiter
  labels:
    app: rate-limiter
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rate-limiter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # zero-downtime deploys
  template:
    metadata:
      labels:
        app: rate-limiter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "8000"
    spec:
      serviceAccountName: rate-limiter-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000

      # ── Containers ─────────────────────────────────────────────────────
      containers:
        - name: rate-limiter
          image: YOUR_ECR_URI/rate-limiter:latest    # replaced by CI/CD
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: rate-limiter-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
                  optional: true

          # ── Probes ───────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds:       15
            failureThreshold:    3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds:       10
            failureThreshold:    2

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold:    12   # 12 × 5s = 60s startup budget
            periodSeconds:       5

          # ── Resources ────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: ["ALL"]

      # ── Scheduling ───────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew:           1
          topologyKey:       "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rate-limiter

      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rate-limiter-sa
  namespace: rate-limiter
