version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rate-limiter:
    build: .
    container_name: rate-limiter-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REDIS_URL:                  redis://redis:6379/0
      PIPELINE_BATCH_SIZE:        "100"
      DEFAULT_LIMIT_PER_SECOND:   "10"
      IP_LIMIT_PER_MINUTE:        "500"
      LOG_LEVEL:                  "INFO"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
